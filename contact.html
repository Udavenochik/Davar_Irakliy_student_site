<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обратная связь - Ираклий Давар</title>
    <link rel="stylesheet" href="Irakliy.css">
</head>
<body>
    <div id="page-wrapper">
        <header class="main-header">
            <h1>Обратная связь</h1>
            <p class="student-name"><strong>Давар Ираклий Акакиевич</strong> | Студент 4-го курса МИЭМ ВШЭ</p>
        </header>

        <nav class="main-nav">
            <ul>
                <li><a href="/">Главная</a></li>
                <li><a href="/contact">Обратная связь</a></li>
                <li><a href="/submissions">Заявки</a></li>
                <li><a href="https://www.hse.ru" target="_blank">Сайт ВШЭ</a></li>
            </ul>
        </nav>

        <main>
            <section class="main-article" style="max-width: 760px; margin: 0 auto;">
                <h2>📬 Напишите мне</h2>
                <p style="margin-bottom: 20px;">Данные из формы сохраняются в MongoDB и отображаются на странице заявок.</p>

                <form id="contact-form" action="/contact" method="post">
                    <label for="surname">Фамилия *</label>
                    <input type="text" id="surname" name="surname" required>

                    <label for="name">Имя *</label>
                    <input type="text" id="name" name="name" required>

                    <label for="patronymic">Отчество</label>
                    <input type="text" id="patronymic" name="patronymic">

                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>

                    <label for="phone">Телефон</label>
                    <input type="tel" id="phone" name="phone">

                    <label for="status">Ваш статус *</label>
                    <select id="status" name="status" required>
                        <option value="">Выберите статус</option>
                        <option value="student">Студент ВШЭ</option>
                        <option value="applicant">Абитуриент</option>
                        <option value="graduate">Выпускник</option>
                        <option value="teacher">Преподаватель</option>
                        <option value="other">Другое</option>
                    </select>

                    <label for="faculty">Факультет / кампус</label>
                    <input type="text" id="faculty" name="faculty" value="МИЭМ">

                    <label for="message">Сообщение *</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Напишите ваш вопрос..."></textarea>

                    <button type="submit">Отправить</button>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
